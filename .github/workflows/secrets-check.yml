name: Secrets + Personal Data

# Runs on every PR and push to main. Catches:
# - Personal data files that shouldn't be committed (profile.yaml, resume.*, .env, applications/, cache/)
# - Leaked secrets via gitleaks (API keys, tokens, etc.)
#
# This is the same logic as scripts/pre-commit but enforced at the CI layer in case
# a contributor bypasses the local hook.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  personal-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block personal data paths
        run: |
          # Mirrors scripts/pre-commit. Any file matching these patterns is a leak.
          BLOCKED='^(profile\.yaml|resume(\..*)?\.pdf|resume.*\.md|\.env|applications/.*|cache/.*)$'

          # On PRs, scan the changed files. On push to main, scan the whole tree.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            files=$(git diff --name-only "$base" "$head")
          else
            files=$(git ls-files)
          fi

          violations=$(printf '%s\n' "$files" | grep -E "$BLOCKED" || true)

          if [ -n "$violations" ]; then
            echo "::error::Personal data files committed:"
            printf '::error::  %s\n' $violations
            echo
            echo "These paths are gitignored. If they're tracked, someone bypassed the hook (probably via 'git add -f')."
            echo "Run scripts/install-hooks.sh locally to install the pre-commit hook."
            exit 1
          fi

          echo "OK — no personal data paths in the change set."

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          version="8.24.3"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full git history
        # `git` mode scans every commit, not just the current tree. Catches
        # secrets that were committed and then deleted in a later commit —
        # `dir` mode would miss those. The original gitleaks-action@v2 wrapper
        # hit a `<initial>^..HEAD` ambiguous-range edge case on the first
        # push; plain `gitleaks git .` doesn't use that range syntax, so it
        # works robustly once the repo has any history.
        run: gitleaks git . --config .gitleaks.toml --redact --verbose
